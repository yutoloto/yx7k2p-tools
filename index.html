<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #0f172a; color: #f1f5f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .cell-input {
      width: 100%; background: transparent; border: none; outline: none;
      text-align: center; font-size: 15px; color: #f1f5f9;
      padding: 6px 2px; caret-color: #60a5fa; font-variant-numeric: tabular-nums;
    }
    .cell-input::placeholder { color: #334155; }
    .cell-input:focus { background: rgba(96,165,250,0.12); border-radius: 6px; }
    .row-filled { background: #1e293b; }
    .row-filled:nth-child(even) { background: #172030; }
    .row-invalid { background: rgba(239,68,68,0.12); }
    .row-empty { background: transparent; }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .pulse-red { animation: pulse-red 1.5s ease-in-out infinite; }
    .chip-input {
      width: 100%; background: transparent; border: none; outline: none;
      text-align: center; font-size: 20px; font-weight: 800; color: #fbbf24;
      caret-color: #fbbf24; padding: 4px 0;
    }
    .chip-input::placeholder { color: #44403c; font-weight: 400; font-size: 14px; }
    .chip-input:focus { background: rgba(251,191,36,0.1); border-radius: 6px; }
    .row-filled .cell-input:not(:placeholder-shown) { color: #e2e8f0; }
    .row-invalid .cell-input:not(:placeholder-shown) { color: #fca5a5; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  const { useState, useCallback, useRef, useEffect, useMemo } = React;
  const html = htm.bind(React.createElement);

  const DEFAULT_PLAYERS_3 = ['Aさん', 'Bさん', 'Cさん'];
  const DEFAULT_PLAYERS_4 = ['Aさん', 'Bさん', 'Cさん', 'Dさん'];
  const INITIAL_ROWS = 40;
  const AUTO_ADD_THRESHOLD = 5;

  function makeEmptyRow(n) {
    return Array.from({ length: n }, () => ({ pt: '' }));
  }

  function parseNum(v) {
    if (v === '' || v === '-' || v === '+') return null;
    const n = Number(v);
    return isNaN(n) ? null : n;
  }

  function rowStatus(cells) {
    const pts = cells.map(c => parseNum(c.pt));
    const allEmpty = pts.every(v => v === null);
    if (allEmpty) return { status: 'empty', diff: 0 };
    const ptSum = pts.reduce((a, b) => a + (b ?? 0), 0);
    return { status: ptSum === 0 ? 'valid' : 'invalid', diff: ptSum };
  }

  function chipStatus(chips, numPlayers) {
    const vals = chips.slice(0, numPlayers).map(v => parseNum(v));
    const allEmpty = vals.every(v => v === null);
    if (allEmpty) return 'empty';
    const sum = vals.reduce((a, b) => a + (b ?? 0), 0);
    return sum === 0 ? 'valid' : 'invalid';
  }

  function SettingsPanel({ numPlayers, setNumPlayers, pointRate, setPointRate, chipRate, setChipRate }) {
    return html`
      <div class="bg-slate-800 rounded-2xl p-4 mb-3 shadow-lg">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm font-bold text-slate-300">設定</span>
          <div class="flex rounded-xl overflow-hidden border border-slate-600">
            ${[3,4].map(n => html`
              <button key=${n} onClick=${() => setNumPlayers(n)}
                class=${n === numPlayers ? 'px-4 py-1.5 text-sm font-bold bg-blue-600 text-white' : 'px-4 py-1.5 text-sm font-bold bg-slate-700 text-slate-400'}

              >${n}人</button>
            `)}
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-slate-700 rounded-xl p-3">
            <div class="text-xs text-slate-400 mb-1">点数レート（1pt）</div>
            <div class="flex items-center gap-1">
              <input type="number" inputMode="numeric" value=${pointRate}
                onChange=${e => setPointRate(e.target.value)}
                class="bg-transparent text-white font-bold text-lg w-full outline-none text-right"
                placeholder="10" />
              <span class="text-slate-400 text-sm shrink-0">円</span>
            </div>
          </div>
          <div class="bg-slate-700 rounded-xl p-3">
            <div class="text-xs text-slate-400 mb-1">チップレート（1枚）</div>
            <div class="flex items-center gap-1">
              <input type="number" inputMode="numeric" value=${chipRate}
                onChange=${e => setChipRate(e.target.value)}
                class="bg-transparent text-white font-bold text-lg w-full outline-none text-right"
                placeholder="50" />
              <span class="text-slate-400 text-sm shrink-0">円</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function ScoreGrid({ players, setPlayers, rows, setRows, numPlayers }) {
    const inputRefs = useRef([]);

    const handleChange = useCallback((ri, pi, val) => {
      setRows(prev => {
        const next = prev.map(r => r.map(c => ({...c})));
        next[ri][pi].pt = val;
        return next;
      });
    }, [setRows]);

    const handleFocus = useCallback((ri) => {
      setRows(prev => {
        const emptyFromEnd = [...prev].reverse().findIndex(r => rowStatus(r).status !== 'empty');
        const trailingEmpty = emptyFromEnd === -1 ? prev.length : emptyFromEnd;
        if (trailingEmpty <= AUTO_ADD_THRESHOLD) {
          return [...prev, ...Array.from({ length: 10 }, () => makeEmptyRow(numPlayers))];
        }
        return prev;
      });
    }, [setRows, numPlayers]);

    const handleEnterNext = useCallback((ri, pi) => {
      const next = ri * numPlayers + pi + 1;
      if (inputRefs.current[next]) inputRefs.current[next].focus();
    }, [numPlayers]);

    const filledCount = useMemo(() => rows.filter(r => rowStatus(r).status !== 'empty').length, [rows]);
    const invalidCount = useMemo(() => rows.filter(r => rowStatus(r).status === 'invalid').length, [rows]);

    return html`
      <div class="bg-slate-900 rounded-2xl overflow-hidden shadow-lg">
        <div class="px-2 pt-2 pb-1 bg-slate-900 border-b border-slate-700">
          <div class="flex gap-1 items-center">
            <div class="w-9 shrink-0 text-center">
              <span class="text-xs text-slate-500">#</span>
            </div>
            ${players.map((name, i) => html`
              <div key=${i} class="flex-1 min-w-0">
                <input
                  value=${name}
                  onChange=${e => {
                    const next = [...players];
                    next[i] = e.target.value;
                    setPlayers(next);
                  }}
                  class="w-full bg-slate-700 text-center text-sm font-bold text-blue-300 rounded-lg py-1 px-1 outline-none border border-slate-600"
                  maxLength="6"
                />
              </div>
            `)}
            <div class="w-10 shrink-0 text-center">
              <span class="text-xs text-slate-500">ズレ</span>
            </div>
          </div>
          <div class="flex items-center justify-between mt-1 px-1">
            <span class="text-xs text-slate-500">${filledCount}局入力済み</span>
            ${invalidCount > 0 && html`<span class="text-xs text-red-400 pulse-red font-bold">⚠ ${invalidCount}行 合計≠0</span>`}
          </div>
        </div>

        <div class="overflow-y-auto px-2 pb-2" style=${{ maxHeight: '55vh' }}>
          ${rows.map((cells, ri) => {
            const { status, diff } = rowStatus(cells);
            const rowCls = status === 'invalid' ? 'row-invalid' : status === 'empty' ? 'row-empty' : 'row-filled';
            return html`
              <div key=${ri} class=${"flex gap-1 rounded-lg " + rowCls} style=${{ marginBottom: '2px' }}>

                <div class="w-9 shrink-0 flex items-center justify-center">
                  <span class=${"text-xs font-mono " + (status === "empty" ? "text-slate-700" : "text-slate-400")}>${ri + 1}</span>

                </div>
                ${cells.map((cell, pi) => html`
                  <div key=${pi} class="flex-1 min-w-0">
                    <input
                      ref=${el => { inputRefs.current[ri * numPlayers + pi] = el; }}
                      type="number"
                      inputMode="numeric"
                      value=${cell.pt}
                      placeholder="—"
                      onChange=${e => handleChange(ri, pi, e.target.value)}
                      onFocus=${() => handleFocus(ri)}
                      onKeyDown=${e => {
                        if (e.key === 'Enter' || e.key === 'Tab') {
                          e.preventDefault();
                          handleEnterNext(ri, pi);
                        }
                      }}
                      class="cell-input"
                    />
                  </div>
                `)}
                <div class="w-10 shrink-0 flex items-center justify-center">
                  ${status === 'invalid' && html`<span class="text-xs font-bold tabular-nums text-red-400 pulse-red">${diff > 0 ? '+' : ''}${diff}</span>`}
                  ${status === 'valid' && html`<span class="text-xs text-green-500">✓</span>`}
                </div>
              </div>
            `;
          })}
          <button
            onClick=${() => setRows(prev => [...prev, ...Array.from({ length: 10 }, () => makeEmptyRow(numPlayers))])}
            class="w-full mt-2 py-2 rounded-xl text-xs text-slate-500 border border-dashed border-slate-700"
          >＋ 10行追加</button>
        </div>
      </div>
    `;
  }

  function ChipPanel({ players, chips, setChips, numPlayers }) {
    const status = chipStatus(chips, numPlayers);
    const sum = chips.slice(0, numPlayers).reduce((a, v) => a + (parseNum(v) ?? 0), 0);
    const borderCls = status === 'invalid' ? 'border-red-500' : status === 'valid' ? 'border-green-500' : 'border-yellow-900';
    return html`
      <div class=${"rounded-2xl p-4 mt-3 shadow-lg border bg-slate-800 " + borderCls}>

        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="text-base">🪙</span>
            <span class="text-sm font-bold text-yellow-300">チップ（セッション合計）</span>
          </div>
          ${status === 'invalid' && html`<div class="text-xs text-red-400 pulse-red font-bold">合計 ${sum > 0 ? '+' : ''}${sum} ≠ 0</div>`}
          ${status === 'valid' && html`<div class="text-xs text-green-400 font-bold">✓ 合計 0</div>`}
        </div>
        <div class="flex gap-2">
          ${players.map((name, i) => html`
            <div key=${i} class="flex-1 min-w-0 text-center">
              <div class="text-xs text-slate-400 mb-1 truncate">${name || `P${i+1}`}</div>
              <div class="bg-slate-700 rounded-xl border border-yellow-900 py-1.5 px-1">
                <input
                  type="number" inputMode="numeric"
                  value=${chips[i] ?? ''}
                  placeholder="0"
                  onChange=${e => {
                    const next = [...chips];
                    next[i] = e.target.value;
                    setChips(next);
                  }}
                  class="chip-input"
                />
              </div>
              <div class="text-xs text-slate-500 mt-1">枚</div>
            </div>
          `)}
        </div>
      </div>
    `;
  }

  function ResultBar({ players, rows, chips, numPlayers, pointRate, chipRate }) {
    const pr = parseNum(pointRate) ?? 10;
    const cr = parseNum(chipRate) ?? 50;
    const totals = players.map((_, i) => {
      const pt = rows.reduce((s, row) => s + (parseNum(row[i].pt) ?? 0), 0);
      const chip = parseNum(chips[i]) ?? 0;
      const yen = pt * pr + chip * cr;
      return { pt, chip, yen };
    });
    const maxAbs = Math.max(1, ...totals.map(t => Math.abs(t.yen)));
    return html`
      <div class="bg-slate-800 rounded-2xl p-4 mt-3 shadow-lg">
        <div class="text-sm font-bold text-slate-300 mb-3">精算結果</div>
        <div class="space-y-3">
          ${players.map((name, i) => {
            const { pt, chip, yen } = totals[i];
            const isPos = yen >= 0;
            const barW = Math.round(Math.abs(yen) / maxAbs * 100);
            return html`
              <div key=${i} class="bg-slate-700 rounded-xl p-3">
                <div class="flex items-baseline justify-between mb-1">
                  <span class="font-bold text-white">${name || `P${i+1}`}</span>
                  <span class=${"text-2xl font-black tabular-nums " + (isPos ? "text-blue-400" : "text-red-400")}>

                    ${isPos ? '+' : ''}${yen.toLocaleString()}円
                  </span>
                </div>
                <div class="flex gap-3 text-xs text-slate-400 mb-2">
                  <span>pt: <b class="text-slate-200">${pt > 0 ? '+' : ''}${pt}</b></span>
                  <span>chip: <b class="text-yellow-400">${chip > 0 ? '+' : ''}${chip}枚</b></span>
                  <span class="text-slate-500 ml-auto">${(pt*pr>0?'+':'')}${(pt*pr).toLocaleString()} + ${(chip*cr>0?'+':'')}${(chip*cr).toLocaleString()}</span>
                </div>
                <div class="relative h-1.5 bg-slate-600 rounded-full overflow-hidden">
                  <div
                    class=${"absolute h-full rounded-full transition-all " + (isPos ? "bg-blue-500" : "bg-red-500")}
                    style=${{ position:'absolute', height:'100%', right: isPos ? '50%' : 'auto', left: isPos ? 'auto' : '50%', width: (barW/2) + '%' }}
                  ></div>
                  <div class="absolute left-1/2 top-0 h-full w-px bg-slate-400 opacity-40"></div>
                </div>
              </div>
            `;
          })}
        </div>
        <div class="mt-3 pt-3 border-t border-slate-600 text-xs text-slate-500 text-center">
          ${pr}円/pt・${cr}円/chip
        </div>
      </div>
    `;
  }

  function App() {
    const [numPlayers, setNumPlayers] = useState(3);
    const [players, setPlayers] = useState(DEFAULT_PLAYERS_3);
    const [pointRate, setPointRate] = useState('10');
    const [chipRate, setChipRate] = useState('50');
    const [rows, setRows] = useState(() => Array.from({ length: INITIAL_ROWS }, () => makeEmptyRow(3)));
    const [chips, setChips] = useState(['', '', '', '']);

    useEffect(() => {
      const nextPlayers = numPlayers === 3 ? DEFAULT_PLAYERS_3.slice() : DEFAULT_PLAYERS_4.slice();
      setPlayers(nextPlayers);
      setRows(prev => prev.map(row => {
        const next = makeEmptyRow(numPlayers);
        for (let i = 0; i < Math.min(row.length, numPlayers); i++) next[i] = { pt: row[i].pt };
        return next;
      }));
    }, [numPlayers]);

    return html`
      <div class="min-h-screen p-3 pb-10 max-w-lg mx-auto">
        <div class="mb-3 flex items-center gap-3">
          <svg width="48" height="62" viewBox="0 0 48 62" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="46" height="60" rx="6" ry="6" fill="#f5f0e8" stroke="#b0956e" stroke-width="1.5"/>
            <rect x="3.5" y="3.5" width="41" height="55" rx="4" ry="4" fill="none" stroke="#b0956e" stroke-width="0.7"/>
            <text x="24" y="44" text-anchor="middle" font-family="serif" font-size="34" font-weight="900" fill="#cc0000">中山</text>
          </svg>
          <div>
            <h1 class="text-2xl font-black text-white tracking-wide">爆速スコア表</h1>
            <p class="text-xs text-slate-500">麻雀精算リアルタイム計算</p>
          </div>
        </div>
        <${SettingsPanel}
          numPlayers=${numPlayers} setNumPlayers=${setNumPlayers}
          pointRate=${pointRate} setPointRate=${setPointRate}
          chipRate=${chipRate} setChipRate=${setChipRate}
        />
        <${ScoreGrid}
          players=${players} setPlayers=${setPlayers}
          rows=${rows} setRows=${setRows}
          numPlayers=${numPlayers}
        />
        <${ChipPanel}
          players=${players} chips=${chips}
          setChips=${setChips} numPlayers=${numPlayers}
        />
        <${ResultBar}
          players=${players} rows=${rows}
          chips=${chips} numPlayers=${numPlayers}
          pointRate=${pointRate} chipRate=${chipRate}
        />
      </div>
    `;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
})();

</script>
</body>
</html>
